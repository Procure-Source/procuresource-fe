name: Azure Backend Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  AZURE_WEBAPP_NAME: procuresource-prod-2605

jobs:
  validate:
    name: Validate frontend and backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build Next frontend
        run: npm run build

      - name: Check backend syntax
        run: npm --prefix backend run check

  deploy-backend:
    name: Deploy backend to Azure App Service
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    environment:
      name: production
      url: https://procuresource-prod-2605.azurewebsites.net/health

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROCURESOURCE_PROD_2605 }}
          package: backend
